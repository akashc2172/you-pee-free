# Stent Design Parameter Configuration
# Updated 2026-02-02: Consolidated from old stent generation code

# ==============================================================================
# SAMPLED PARAMETERS (LHS inputs)
# ==============================================================================
design_variables:
  # Primary dimensions
  stent_french:
    type: continuous
    range: [4.0, 8.0]
    default: 6.0
    description: "Stent diameter in French units (1 Fr = 0.333 mm)"
    
  stent_length:
    type: continuous
    range: [100, 300]
    default: 150
    description: "Total body length in millimeters"
    
  # Coil parameters (proximal)
  coil_R_prox:
    type: continuous
    range: [4.0, 12.0]
    default: 6.0
    description: "Proximal coil radius in mm"


  pitch_prox:
    type: continuous
    range: [4.0, 10.0]
    default: 6.0
    description: "Proximal helix pitch in mm"
    
  turns_prox:
    type: continuous
    range: [0.5, 2.5]
    default: 1.5
    description: "Number of proximal helix turns"
    
  # Coil parameters (distal)
  coil_R_dist:
    type: continuous
    range: [4.0, 12.0]
    default: 6.0
    description: "Distal coil radius in mm"
    
  pitch_dist:
    type: continuous
    range: [4.0, 10.0]
    default: 6.0
    description: "Distal helix pitch in mm"
    
  turns_dist:
    type: continuous
    range: [0.5, 2.5]
    default: 1.5
    description: "Number of distal helix turns"
    
  # Fraction-based parameters (guarantees valid geometry)
  r_t:
    type: continuous
    range: [0.10, 0.22]
    default: 0.15
    description: "Wall thickness fraction: wall = r_t × OD"
    
  r_sh:
    type: continuous
    range: [0.20, 0.70]
    default: 0.50
    description: "Side hole diameter fraction: d_sh = r_sh × ID"
    
  r_end:
    type: continuous
    range: [0.30, 0.95]
    default: 0.70
    description: "End hole diameter fraction: d_end = r_end × ID"
    
  # Hole counts
  n_prox:
    type: discrete
    range: [0, 10]
    default: 3
    description: "Number of proximal side holes"
    
  n_mid:
    type: discrete
    range: [0, 15]
    default: 6
    description: "Number of middle side holes"
    
  n_dist:
    type: discrete
    range: [0, 10]
    default: 3
    description: "Number of distal side holes"
    
  # Section lengths
  section_length_prox:
    type: continuous
    range: [20, 60]
    default: 30
    description: "Proximal section length in mm"
    
  section_length_dist:
    type: continuous
    range: [20, 60]
    default: 30
    description: "Distal section length in mm"
    
  # Unroofed cut
  unroofed_length:
    type: continuous
    range: [0, 30]
    default: 0
    description: "Length of unroofed section at distal end in mm"

# ==============================================================================
# DERIVED PARAMETERS (computed from sampled values)
# ==============================================================================
derived_parameters:
  OD:
    formula: "0.333 × stent_french"
    unit: "mm"
    
  wall_thickness:
    formula: "r_t × OD"
    unit: "mm"
    
  ID:
    formula: "OD - 2 × wall_thickness"
    unit: "mm"
    
  d_sh:
    formula: "min(r_sh × ID, ID - 0.15)"
    unit: "mm"
    
  section_length_mid:
    formula: "stent_length - section_length_prox - section_length_dist"
    unit: "mm"

# ==============================================================================
# VALIDATION CONSTRAINTS
# ==============================================================================
constraints:
  ID_min: 0.6
  d_sh_min: 0.3
  cap_margin: 0.15
  gap_min: 0.3
  buffer_min: 1.0
  section_middle_min: 10

# ==============================================================================
# SAMPLING CONFIGURATION
# ==============================================================================
sampling:
  default_method: "lhs"
  default_samples: 60
  oversample_factor: 3
  random_seed: 42
  n_dims: 16  # Total sampled dimensions

# ==============================================================================
# STL EXPORT DEFAULTS (visualization/manufacturing mesh)
# ==============================================================================
stl_export:
  default_profile: "standard"
  ascii_format: false
  validate_mesh: true
  profiles:
    draft:
      tolerance: 0.005
      angular_tolerance: 0.25
    standard:
      tolerance: 0.001
      angular_tolerance: 0.1
    high:
      tolerance: 0.0005
      angular_tolerance: 0.05

# ==============================================================================
# CAD POST-PROCESS RULES (non-sampled behavior)
# ==============================================================================
cad_postprocess:
  unroofed_hole_policy: "auto_rebalance"
  unroofed_clearance_mode: "max(buffer_min,hole_radius)"
  emit_realized_features: true

# ==============================================================================
# OUTPUT VARIABLES (from COMSOL)
# ==============================================================================
output_variables:
  - name: "delta_P"
    description: "Pressure drop (Pa)"
    direction: "minimize"
    
  - name: "Q_total"
    description: "Total outlet flow (mL/min)"
    direction: "maximize"
    
  - name: "Q_sh_prox"
    description: "Proximal side-hole flow (mL/min)"
    
  - name: "Q_sh_mid"
    description: "Middle side-hole flow (mL/min)"
    
  - name: "Q_sh_dist"
    description: "Distal side-hole flow (mL/min)"
    
  - name: "CV_Qsh"
    description: "Coefficient of variation of side-hole flows"
    direction: "minimize"
